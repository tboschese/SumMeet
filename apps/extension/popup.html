<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #0E142E;
      }
      h1 { font-size: 15px; margin: 0 0 4px; }
      p { font-size: 12px; color: #6b7280; margin: 0 0 12px; line-height: 1.4; }
      label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 9px;
        font-size: 13px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 9px;
        font-size: 13px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      #mic { background: #0E142E; color: #fff; }
      #save { background: #EFEEFD; color: #4F42E0; }
      #status { margin-top: 10px; font-size: 12px; }
      #status.ok { color: #15803d; }
      #status.err { color: #b91c1c; }
      .hint { font-size: 11px; color: #9ca3af; margin-top: 12px; line-height: 1.4; }
    </style>
  </head>
  <body>
    <h1>SumMeet Recorder</h1>
    <p>Records the current meeting tab + your mic, straight into your local SumMeet.</p>

    <label for="api">SumMeet API URL</label>
    <input id="api" type="text" placeholder="http://localhost:8080" />
    <button id="save" type="button">Save</button>

    <button id="mic" type="button">Enable microphone</button>
    <button id="rec" type="button" style="background:#4F42E0;color:#fff">● Record this tab</button>

    <div id="status"></div>

    <p class="hint">
      Grant the mic once (Chrome remembers it). Then open a Meet / Teams-web /
      Zoom-web call and hit the floating <strong>Record</strong> button.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
